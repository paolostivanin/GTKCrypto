<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="120" height="120" rx="28" ry="28" fill="url(#bg)"/>

  <!-- Key — minimal flat style, 45deg angle -->
  <g transform="translate(64,64) rotate(-45)">
    <!-- Head ring -->
    <circle cx="-20" cy="0" r="16" fill="none" stroke="#ffffff" stroke-width="5.5"/>

    <!-- Shaft -->
    <rect x="-4" y="-2.75" width="44" height="5.5" rx="2.75" fill="#ffffff"/>

    <!-- Teeth -->
    <rect x="24" y="2.75" width="5.5" height="9" rx="2" fill="#ffffff"/>
    <rect x="33" y="2.75" width="5.5" height="13" rx="2" fill="#ffffff"/>
  </g>
</svg>
